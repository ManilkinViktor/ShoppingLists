services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shopping_lists_api
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      PYTHONPATH: /app/src
    command: sh -c "alembic upgrade head && python3 src/main.py"
    networks:
      - postgres
      - shared-network
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: shopping_lists_db

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/data/pgdata

    volumes:
      - ./pgdata:/var/lib/postgresql/data/pgdata

    networks:
      - postgres

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5

    restart: unless-stopped
    tty: true
    stdin_open: true


  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: shopping_lists_pgadmin

    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: 'False'
      PGADMIN_CONFIG_SERVER_MODE: 'True'
      PGADMIN_CONFIG_COOKIE_SAMESITE: 'None'
      PGADMIN_CONFIG_COOKIE_SECURE: 'True'
      PGADMIN_LISTEN_PORT: 80

    volumes:
      - ./pgadmin_data:/var/lib/pgadmin
    networks:
      - postgres
      - shared-network
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

networks:
  postgres:
    driver: bridge
  shared-network:
    external: true


volumes:
  pg_data:
  pgadmin_data:
