services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shopping_lists_api
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      PYTHONPATH: /app/src
    command: sh -c "alembic upgrade head && python3 src/main.py"
    ports:
      - '${APP_PORT:-8000}:8000'
    networks:
      - postgres
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: shopping_lists_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", 'yes']
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5


  db:
    image: postgres:15-alpine
    container_name: postgres_container

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/data/pgdata

    volumes:
      - ./pgdata:/var/lib/postgresql/data/pgdata

    ports:
      - '${DB_PORT}:5432'

    networks:
      - postgres

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5

    restart: unless-stopped
    tty: true
    stdin_open: true


  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_container

    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    volumes:
      - ./pgadmin_data:/var/lib/pgadmin
    ports:
      - "${PGADMIN_PORT}:80"
    networks:
      - postgres
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

networks:
  postgres:
    driver: bridge


volumes:
  redis_data:
  pg_data:
  pgadmin_data:
